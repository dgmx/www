<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPv6 SLAAC + EUI-64</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #f5f5f5; --card: #fff; --text: #333; --label: #555; --border: #ccc; --row-border: #eee; --label-color: #666; --val-color: #222; --step-bg: #f0f6ff; }
  [data-theme="dark"] { --bg: #1a1a1a; --card: #2a2a2a; --text: #e0e0e0; --label: #aaa; --border: #555; --row-border: #3a3a3a; --label-color: #999; --val-color: #eee; --step-bg: #1e2a3a; }
  body { font-family: system-ui, sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; background: var(--bg); transition: background .2s; padding: 1rem; }
  .card { background: var(--card); padding: 2rem; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.1); width: 620px; transition: background .2s; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
  h1 { font-size: 1.4rem; color: var(--text); }
  .nav-links { display: flex; gap: .5rem; }
  .nav-link { color: #0066cc; text-decoration: none; font-size: .8rem; font-weight: 600; padding: .3rem .6rem; border-radius: 6px; border: 1px solid var(--border); }
  .nav-link:hover { background: var(--border); }
  .theme-btn { background: none; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 1.2rem; width: 40px; height: 36px; display: flex; align-items: center; justify-content: center; margin-top: 0; color: var(--text); transition: background .2s; }
  .theme-btn:hover { background: var(--border); }
  .tabs { display: flex; gap: .5rem; margin-bottom: 1.2rem; }
  .tab { flex: 1; padding: .6rem; text-align: center; font-size: .9rem; font-weight: 600; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; background: var(--card); color: var(--label); transition: all .2s; }
  .tab.active { background: #0066cc; color: #fff; border-color: #0066cc; }
  .tab:hover:not(.active) { background: var(--border); }
  .field { margin-bottom: 1rem; }
  label { display: block; margin-bottom: .3rem; font-weight: 600; color: var(--label); font-size: .9rem; }
  input { width: 100%; padding: .6rem .8rem; font-size: 1rem; font-family: monospace; border: 1px solid var(--border); border-radius: 6px; background: var(--card); color: var(--text); transition: background .2s; }
  input:focus { outline: 2px solid #0066cc; border-color: transparent; }
  button { width: 100%; padding: .7rem; font-size: 1rem; font-weight: 600; color: #fff; background: #0066cc; border: none; border-radius: 6px; cursor: pointer; margin-top: .2rem; }
  button:hover { background: #0052a3; }
  .panel { display: none; }
  .panel.active { display: block; }
  .error { color: #cc0000; margin-top: .6rem; font-size: .9rem; min-height: 1.3rem; }
  .steps { margin-top: 1.2rem; }
  .step { background: var(--step-bg); border-radius: 8px; padding: .8rem 1rem; margin-bottom: .6rem; transition: background .2s; }
  .step .s-title { font-weight: 600; font-size: .85rem; color: var(--label); margin-bottom: .3rem; }
  .step .s-content { font-family: monospace; font-size: 1rem; color: var(--val-color); word-break: break-all; }
  .step .s-detail { font-size: .8rem; color: var(--label-color); margin-top: .2rem; font-family: monospace; }
  .result-box { background: #e8f5e9; border-radius: 8px; padding: 1rem; text-align: center; margin-top: 1rem; transition: background .2s; }
  [data-theme="dark"] .result-box { background: #1b3a1b; }
  .result-box .r-label { font-size: .8rem; color: var(--label); font-weight: 600; }
  .result-box .r-value { font-family: monospace; font-size: 1.2rem; font-weight: 700; color: #2e7d32; margin-top: .3rem; word-break: break-all; }
  [data-theme="dark"] .result-box .r-value { color: #66bb6a; }
  .footer { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--row-border); text-align: center; font-size: .8rem; color: var(--label-color); }
  .footer a { color: var(--label-color); text-decoration: none; }
  .footer a:hover { color: #0066cc; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>IPv6 SLAAC + EUI-64</h1>
    <div class="nav-links">
      <a class="nav-link" href="index.html">IP/CIDR</a>
      <a class="nav-link" href="vlsm.html">VLSM</a>
      <button class="theme-btn" id="themeBtn" aria-label="Cambiar modo">☀️</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="mac2ipv6">MAC → IPv6</div>
    <div class="tab" data-tab="ipv62mac">IPv6 → MAC</div>
  </div>

  <div class="panel active" id="panel-mac2ipv6">
    <div class="field">
      <label for="macInput">Dirección MAC</label>
      <input id="macInput" type="text" placeholder="D2:4F:23:1A:5B:9C" value="D2:4F:23:1A:5B:9C">
    </div>
    <button id="calcMacBtn">Calcular IPv6</button>
  </div>

  <div class="panel" id="panel-ipv62mac">
    <div class="field">
      <label for="ipv6Input">Dirección IPv6 link-local</label>
      <input id="ipv6Input" type="text" placeholder="fe80::d04f:23ff:fe1a:5b9c" value="fe80::d04f:23ff:fe1a:5b9c">
    </div>
    <button id="calcIpv6Btn">Calcular MAC</button>
  </div>

  <div id="error" class="error"></div>
  <div id="steps" class="steps"></div>
  <div id="result"></div>
  <div class="footer"><a href="https://diegojgonzalez.org">diegojgonzalez.org</a></div>
</div>

<script>
// ── Theme ──
const themeBtn = document.getElementById('themeBtn');
function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  themeBtn.textContent = theme === 'dark' ? '🌙' : '☀️';
  localStorage.setItem('theme', theme);
}
function toggleTheme() {
  setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}
setTheme(localStorage.getItem('theme') || 'light');
themeBtn.addEventListener('click', toggleTheme);

// ── Tabs ──
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
    document.getElementById('error').textContent = '';
    document.getElementById('steps').innerHTML = '';
    document.getElementById('result').innerHTML = '';
  });
});

// ── Utils ──
function hex2bin(h) {
  return parseInt(h, 16).toString(2).padStart(8, '0');
}
function bin2hex(b) {
  return parseInt(b, 2).toString(16).toUpperCase();
}
function invertULBit(hexByte) {
  const bin = hex2bin(hexByte);
  const inverted = bin.slice(0, 6) + (bin[6] === '0' ? '1' : '0') + bin.slice(7);
  return bin2hex(inverted);
}
function formatMAC(bytes) {
  return bytes.join(':').toUpperCase();
}
function formatIPv6(bytes) {
  const hextets = [];
  for (let i = 0; i < bytes.length; i += 2) {
    const h = ((parseInt(bytes[i], 16) << 8) | parseInt(bytes[i+1], 16)).toString(16);
    hextets.push(h);
  }
  // Compress zeros
  let s = hextets.join(':');
  s = s.replace(/\b0+\b/g, '0');
  // Find longest zero sequence to compress
  s = s.replace(/(^|:)0(:0)+(:|$)/, '::');
  // Avoid multiple ::
  if (s.indexOf('::') !== s.lastIndexOf('::')) {
    // fallback: just use first compression
    s = hextets.join(':');
    s = s.replace(/\b0+\b/g, '0');
    s = s.replace(/(^|:)0(:0)+(:|$)/, '::');
  }
  return s;
}

// ── Parse MAC ──
function parseMAC(str) {
  let clean = str.trim().replace(/[^0-9a-fA-F]/g, '');
  if (clean.length !== 12) return null;
  const bytes = [];
  for (let i = 0; i < 12; i += 2) {
    bytes.push(clean.substring(i, i + 2).toUpperCase());
  }
  return bytes;
}

// ── Parse IPv6 ──
function parseIPv6(str) {
  let s = str.trim().toLowerCase();
  // Handle ::
  if (s.includes('::')) {
    const parts = s.split('::');
    const left = parts[0] ? parts[0].split(':').filter(Boolean) : [];
    const right = parts[1] ? parts[1].split(':').filter(Boolean) : [];
    const missing = 8 - left.length - right.length;
    const middle = Array(missing).fill('0');
    s = [...left, ...middle, ...right].join(':');
  }
  const hextets = s.split(':').filter(Boolean);
  if (hextets.length !== 8) return null;
  const bytes = [];
  for (const h of hextets) {
    if (!/^[0-9a-f]{1,4}$/.test(h)) return null;
    const padded = h.padStart(4, '0');
    bytes.push(padded.substring(0, 2).toUpperCase());
    bytes.push(padded.substring(2, 4).toUpperCase());
  }
  return bytes;
}

// ── MAC to IPv6 ──
function macToIPv6(macBytes) {
  const steps = [];

  // Step 1: show original MAC
  steps.push({ title: 'Dirección MAC original', content: formatMAC(macBytes) });

  // Step 2: split in half
  const firstHalf = macBytes.slice(0, 3);
  const secondHalf = macBytes.slice(3, 6);
  steps.push({
    title: 'Dividir en dos mitades',
    content: `${formatMAC(firstHalf)} + ${formatMAC(secondHalf)}`
  });

  // Step 3: insert FF:FE
  const withFFFE = [...firstHalf, 'FF', 'FE', ...secondHalf];
  steps.push({
    title: 'Insertar FF:FE en el medio (EUI-64)',
    content: formatMAC(withFFFE)
  });

  // Step 4: invert U/L bit
  const inverted = [...withFFFE];
  const origFirst = inverted[0];
  const newFirst = invertULBit(origFirst);
  inverted[0] = newFirst;
  steps.push({
    title: 'Invertir bit U/L del primer byte',
    content: `${origFirst} → ${newFirst} (${hex2bin(origFirst)} → ${hex2bin(newFirst)})`,
    detail: 'El 7º bit (U/L) se invierte para indicar dirección generada localmente'
  });

  // Step 5: prepend fe80::
  const ipv6Bytes = inverted;
  const ipv6 = formatIPv6(ipv6Bytes);
  const fullIPv6 = `fe80::${ipv6}`;

  return { steps, result: fullIPv6 };
}

// ── IPv6 to MAC ──
function ipv6ToMAC(bytes) {
  const steps = [];

  // Check it's fe80::/10
  const firstHextet = (parseInt(bytes[0], 16) << 8) | parseInt(bytes[1], 16);
  if ((firstHextet & 0xffc0) !== 0xfe80) {
    return { error: 'La dirección no es link-local (debe empezar por fe80::/10)' };
  }

  steps.push({ title: 'Identificador de interfaz (últimos 64 bits)', content: formatMAC(bytes.slice(8)) });

  // Take last 64 bits (bytes 8-15)
  const eui64 = bytes.slice(8);
  steps.push({ title: 'Bytes EUI-64', content: formatMAC(eui64) });

  // Remove FF:FE
  const firstThree = eui64.slice(0, 3);
  const lastThree = eui64.slice(5, 8);
  const withoutFFFE = [...firstThree, ...lastThree];
  steps.push({
    title: 'Eliminar FF:FE',
    content: formatMAC(withoutFFFE)
  });

  // Invert U/L bit back
  const inverted = [...withoutFFFE];
  const origFirst = inverted[0];
  const newFirst = invertULBit(origFirst);
  inverted[0] = newFirst;
  steps.push({
    title: 'Invertir bit U/L (volver al valor original)',
    content: `${origFirst} → ${newFirst} (${hex2bin(origFirst)} → ${hex2bin(newFirst)})`
  });

  const mac = formatMAC(inverted);
  return { steps, result: mac };
}

// ── Render UI ──
const errorEl = document.getElementById('error');
const stepsEl = document.getElementById('steps');
const resultEl = document.getElementById('result');

function renderMACtoIPv6() {
  const input = document.getElementById('macInput').value;
  const bytes = parseMAC(input);
  if (!bytes) {
    errorEl.textContent = 'MAC inválida. Formatos: XX:XX:XX:XX:XX:XX, XX-XX-XX-XX-XX-XX o XXXXXXXXXXXX';
    stepsEl.innerHTML = '';
    resultEl.innerHTML = '';
    return;
  }
  errorEl.textContent = '';
  const r = macToIPv6(bytes);
  stepsEl.innerHTML = r.steps.map(s =>
    `<div class="step">
      <div class="s-title">${s.title}</div>
      <div class="s-content">${s.content}</div>
      ${s.detail ? `<div class="s-detail">${s.detail}</div>` : ''}
    </div>`
  ).join('');
  resultEl.innerHTML = `
    <div class="result-box">
      <div class="r-label">Dirección IPv6 link-local</div>
      <div class="r-value">${r.result}</div>
    </div>
  `;
}

function renderIPv6toMAC() {
  const input = document.getElementById('ipv6Input').value;
  const bytes = parseIPv6(input);
  if (!bytes) {
    errorEl.textContent = 'IPv6 inválida. Introduce una dirección IPv6 válida.';
    stepsEl.innerHTML = '';
    resultEl.innerHTML = '';
    return;
  }
  const r = ipv6ToMAC(bytes);
  if (r.error) {
    errorEl.textContent = r.error;
    stepsEl.innerHTML = '';
    resultEl.innerHTML = '';
    return;
  }
  errorEl.textContent = '';
  stepsEl.innerHTML = r.steps.map(s =>
    `<div class="step">
      <div class="s-title">${s.title}</div>
      <div class="s-content">${s.content}</div>
      ${s.detail ? `<div class="s-detail">${s.detail}</div>` : ''}
    </div>`
  ).join('');
  resultEl.innerHTML = `
    <div class="result-box">
      <div class="r-label">Dirección MAC</div>
      <div class="r-value">${r.result}</div>
    </div>
  `;
}

document.getElementById('calcMacBtn').addEventListener('click', renderMACtoIPv6);
document.getElementById('calcIpv6Btn').addEventListener('click', renderIPv6toMAC);
document.getElementById('macInput').addEventListener('keydown', e => { if (e.key === 'Enter') renderMACtoIPv6(); });
document.getElementById('ipv6Input').addEventListener('keydown', e => { if (e.key === 'Enter') renderIPv6toMAC(); });

renderMACtoIPv6();
</script>
</body>
</html>
