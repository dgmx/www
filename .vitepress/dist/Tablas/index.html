<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misión Multiplicar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: #0f172a;
            color: white;
            overflow-x: hidden;
            touch-action: manipulation;
        }
        .font-lucky { font-family: 'Luckiest+Guy', cursive; }
        
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
        }

        .card-anim {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card-anim:active {
            transform: scale(0.95);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-float { animation: bounce 3s ease-in-out infinite; }

        .progress-bar {
            transition: width 0.5s ease-in-out;
        }

        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body>
    <div class="stars" id="star-container"></div>

    <div id="app" class="min-h-screen flex flex-col items-center p-4">
        <!-- Pantalla de Inicio -->
        <div id="home-screen" class="w-full max-w-2xl text-center mt-12">
            <h1 class="text-5xl md:text-7xl font-lucky text-yellow-400 mb-4 drop-shadow-lg animate-float">
                MISIÓN MULTIPLICAR
            </h1>
            <p class="text-xl mb-8 text-blue-300">¡Conviértete en un maestro de las galaxias!</p>
            
            <div class="grid grid-cols-3 md:grid-cols-4 gap-4 mb-8">
                <!-- Botones de Tablas -->
                <script>
                    for(let i=1; i<=12; i++) {
                        document.write(`
                            <button onclick="startMode('practice', ${i})" class="bg-indigo-600 hover:bg-indigo-500 p-4 rounded-2xl border-b-4 border-indigo-800 card-anim text-2xl font-bold">
                                ×${i}
                            </button>
                        `);
                    }
                </script>
            </div>

            <button onclick="startMode('challenge')" class="w-full bg-gradient-to-r from-pink-500 to-purple-600 p-6 rounded-3xl text-3xl font-lucky border-b-8 border-purple-900 card-anim mb-4">
                🚀 MODO DESAFÍO MIXTO
            </button>

            <div id="medals-container" class="mt-8 flex justify-center gap-4 flex-wrap">
                <!-- Medallas dinámicas -->
            </div>
        </div>

        <!-- Pantalla de Juego -->
        <div id="game-screen" class="hidden w-full max-w-xl text-center flex flex-col items-center">
            <div class="w-full flex justify-between items-center mb-6">
                <button onclick="showHome()" class="bg-gray-700 px-4 py-2 rounded-xl text-sm">🏠 Menú</button>
                <div class="text-xl font-bold text-yellow-400">Puntos: <span id="score-display">0</span></div>
            </div>

            <div class="w-full bg-gray-800 h-4 rounded-full mb-8 overflow-hidden">
                <div id="progress-bar" class="progress-bar bg-green-400 h-full w-0"></div>
            </div>

            <div id="question-card" class="bg-white text-gray-900 rounded-3xl p-10 w-full shadow-2xl mb-8 relative">
                <div id="operation" class="text-7xl font-lucky mb-4">5 × 4</div>
                <div class="text-gray-400 text-lg">¿Cuánto es?</div>
            </div>

            <div id="options-grid" class="grid grid-cols-2 gap-4 w-full">
                <!-- Opciones dinámicas -->
            </div>
        </div>

        <!-- Modal de Resultado -->
        <div id="result-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-6 z-50">
            <div class="bg-indigo-900 border-4 border-yellow-400 rounded-3xl p-8 max-w-sm w-full text-center">
                <div id="result-emoji" class="text-6xl mb-4">🏆</div>
                <h2 id="result-title" class="text-3xl font-lucky mb-2">¡Increíble!</h2>
                <p id="result-text" class="text-lg mb-6 text-blue-200"></p>
                <button onclick="showHome()" class="bg-yellow-400 text-gray-900 px-8 py-3 rounded-2xl font-bold text-xl w-full">
                    Continuar
                </button>
            </div>
        </div>
    </div>

    <script>
        // Configuración y Estado
        let state = {
            mode: '', // 'practice' o 'challenge'
            currentTable: 0,
            questionIndex: 0,
            totalQuestions: 10,
            score: 0,
            currentAnswer: 0,
            medals: JSON.parse(localStorage.getItem('multi-medals') || '{}')
        };

        const app = {
            home: document.getElementById('home-screen'),
            game: document.getElementById('game-screen'),
            modal: document.getElementById('result-modal'),
            operation: document.getElementById('operation'),
            optionsGrid: document.getElementById('options-grid'),
            scoreDisplay: document.getElementById('score-display'),
            progressBar: document.getElementById('progress-bar'),
            medalsBox: document.getElementById('medals-container')
        };

        // Estrellas de fondo
        function createStars() {
            const container = document.getElementById('star-container');
            for(let i=0; i<100; i++) {
                const star = document.createElement('div');
                star.style.position = 'absolute';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 'px';
                star.style.height = star.style.width;
                star.style.backgroundColor = 'white';
                star.style.borderRadius = '50%';
                star.style.opacity = Math.random();
                container.appendChild(star);
            }
        }

        function startMode(mode, table = 0) {
            state.mode = mode;
            state.currentTable = table;
            state.questionIndex = 0;
            state.score = 0;
            
            app.home.classList.add('hidden');
            app.game.classList.remove('hidden');
            
            nextQuestion();
        }

        function nextQuestion() {
            if (state.questionIndex >= state.totalQuestions) {
                finishGame();
                return;
            }

            let num1, num2;
            if (state.mode === 'practice') {
                num1 = state.currentTable;
                num2 = Math.floor(Math.random() * 10) + 1;
            } else {
                num1 = Math.floor(Math.random() * 10) + 1;
                num2 = Math.floor(Math.random() * 10) + 1;
            }

            state.currentAnswer = num1 * num2;
            app.operation.innerText = `${num1} × ${num2}`;
            
            // Generar opciones
            let options = [state.currentAnswer];
            while (options.length < 4) {
                let wrong = (num1 + Math.floor(Math.random() * 3 - 1)) * (num2 + Math.floor(Math.random() * 3 - 1));
                if (wrong <= 0 || options.includes(wrong)) {
                    wrong = Math.floor(Math.random() * 144) + 1;
                }
                if (!options.includes(wrong)) options.push(wrong);
            }
            options.sort(() => Math.random() - 0.5);

            app.optionsGrid.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "bg-blue-100 text-blue-900 text-3xl font-bold p-6 rounded-2xl shadow-lg hover:bg-white card-anim border-b-4 border-blue-300";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                app.optionsGrid.appendChild(btn);
            });

            updateUI();
        }

        function checkAnswer(val, btn) {
            if (val === state.currentAnswer) {
                btn.classList.replace('bg-blue-100', 'bg-green-400');
                btn.classList.add('text-white');
                state.score += 10;
                state.questionIndex++;
                setTimeout(nextQuestion, 600);
            } else {
                btn.classList.replace('bg-blue-100', 'bg-red-400');
                btn.classList.add('text-white');
                document.getElementById('question-card').classList.add('shake');
                setTimeout(() => {
                    document.getElementById('question-card').classList.remove('shake');
                    btn.classList.replace('bg-red-400', 'bg-blue-100');
                    btn.classList.remove('text-white');
                }, 500);
            }
        }

        function updateUI() {
            app.scoreDisplay.innerText = state.score;
            app.progressBar.style.width = (state.questionIndex / state.totalQuestions) * 100 + '%';
        }

        function finishGame() {
            app.modal.classList.remove('hidden');
            const title = document.getElementById('result-title');
            const text = document.getElementById('result-text');
            const emoji = document.getElementById('result-emoji');

            if (state.score >= 100) {
                emoji.innerText = "🏆";
                title.innerText = "¡MAESTRO GALÁCTICO!";
                text.innerText = "Has completado la misión sin errores. ¡Eres increíble!";
                
                // Guardar medalla
                const medalKey = state.mode === 'practice' ? `table-${state.currentTable}` : 'challenge';
                state.medals[medalKey] = true;
                localStorage.setItem('multi-medals', JSON.stringify(state.medals));
            } else {
                emoji.innerText = "⭐";
                title.innerText = "¡Buen Trabajo!";
                text.innerText = `Has conseguido ${state.score} puntos. ¡Sigue practicando para ganar la medalla!`;
            }
            renderMedals();
        }

        function showHome() {
            app.modal.classList.add('hidden');
            app.game.classList.add('hidden');
            app.home.classList.remove('hidden');
            renderMedals();
        }

        function renderMedals() {
            app.medalsBox.innerHTML = '';
            // Medalla de desafío
            if (state.medals['challenge']) {
                app.medalsBox.innerHTML += `
                    <div class="flex flex-col items-center">
                        <div class="text-4xl bg-yellow-400 p-3 rounded-full shadow-lg">👑</div>
                        <span class="text-xs mt-1 text-yellow-400">Desafío</span>
                    </div>
                `;
            }
            // Medallas de tablas
            for(let i=1; i<=12; i++) {
                if(state.medals[`table-${i}`]) {
                    app.medalsBox.innerHTML += `
                        <div class="flex flex-col items-center">
                            <div class="text-2xl bg-indigo-500 p-2 rounded-full shadow">🥇</div>
                            <span class="text-xs mt-1 text-indigo-300">T-${i}</span>
                        </div>
                    `;
                }
            }
        }

        window.onload = () => {
            createStars();
            renderMedals();
        };
    </script>
</body>
</html>
